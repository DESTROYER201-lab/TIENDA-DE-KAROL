<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de Karol</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .product img {
      width: 100%;
      border-radius: 10px;
    }
    .price {
      color: green;
      font-weight: bold;
    }
    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  Tienda de Karol
</header>

<div class="container">
  <div class="product">
    <img src="https://via.placeholder.com/300" />
    <h3>Camiseta</h3>
    <p class="price">15€</p>
    <button>Comprar</button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300" />
    <h3>Sudadera</h3>
    <p class="price">30€</p>
    <button>Comprar</button>
  </div>
</div>

</body>
</html>
