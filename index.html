<!DOCTYPE html><html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda de Karol</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }.menu {
  background: #222;
  color: white;
  padding: 10px;
  display: flex;
  gap: 10px;
  justify-content: center;
}

.menu button {
  background: white;
  color: black;
  border: none;
  padding: 8px 12px;
  border-radius: 5px;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.product {
  background: white;
  border-radius: 10px;
  padding: 15px;
  text-align: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: green;
  font-weight: bold;
}

  </style>
</head>
<body><header>
  Tienda de Karol
</header><div class="menu">
  <button onclick="filtrar('todos')">Todo</button>
  <button onclick="filtrar('camisetas')">Camisetas</button>
  <button onclick="filtrar('sudaderas')">Sudaderas</button>
</div><div class="container" id="productos">  <div class="product camisetas">
    <img src="https://via.placeholder.com/300" />
    <h3>Camiseta Blanca</h3>
    <p class="price">15€</p>
  </div>  <div class="product camisetas">
    <img src="https://via.placeholder.com/300" />
    <h3>Camiseta Negra</h3>
    <p class="price">18€</p>
  </div>  <div class="product sudaderas">
    <img src="https://via.placeholder.com/300" />
    <h3>Sudadera Gris</h3>
    <p class="price">30€</p>
  </div></div><script>
function filtrar(categoria) {
  const productos = document.querySelectorAll('.product');

  productos.forEach(p => {
    if (categoria === 'todos') {
      p.style.display = 'block';
    } else {
      if (p.classList.contains(categoria)) {
        p.style.display = 'block';
      } else {
        p.style.display = 'none';
      }
    }
  });
}
</script></body>
</html>
